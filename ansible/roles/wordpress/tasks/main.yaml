    # WordPress 公式レポジトリからダウンロード
    - name: Download WordPress latest 
      get_url:
        url: "https://ja.wordpress.org/latest-ja.tar.gz"
        dest: /tmp/wordpress.tar.gz

    # アーカイブから WordPress 解凍
    - name: Extract WordPress
      unarchive:
        src: /tmp/wordpress.tar.gz
        dest: /tmp/
        remote_src: yes

    # 解凍したファイル群をコピー
    - name: Copy WordPress files to document root
      copy:
        src: /tmp/wordpress.tar.gz
        dest: "{{ wordpress_install_dir }}"
        owner: apache
        group: apache
        mode: '0755'
        remote_src: yes

    # sample.php を　wp-config.php　という名前でコピー
    - name: Copy wp-config-sample.php to wp-config.php
      copy:
        src: "{{ wordpress_install_dir }}/wp-config-sample.php"
        dest: "{{ wordpress_install_dir }}/wp-config.php"
        owner: apache
        group: apache
        mode: '0644'
        remote_src: yes

    # データベースの名前を書き換え
    - name: Set DB name in wp-config.php
      lineinfile: 
        path: "{{ wordpress_install_dir }}/wp-config.php"
        regexp: "define\\(\\s*'DB_NAME'.*\\);"
        line: "define( 'DB_NAME', '{{ wordpress_db_name }}' );"

    # データベースのユーザー名を書き換え
    - name: Set DB user in wp-config.php
      lineinfile: 
        path: "{{ wordpress_install_dir }}/wp-config.php"
        regexp: "define\\(\\s*'DB_USER'.*\\);"
        line: "define( 'DB_USER', '{{ wordpress_db_user }}' );"

    # データベースのパスワードを書き換え
    - name: Set DB ppassword in wp-config.php
      lineinfile: 
        path: "{{ wordpress_install_dir }}/wp-config.php"
        regexp: "define\\(\\s*'DB_PASSWORD'.*\\);"
        line: "define( 'DB_PASSWORD', '{{ wordpress_db_password }}' );"
    
    # ファイル群を Apache から実行
    - name: Set permissions and ownership for WordPress
      file:
        path: "{{ wordpress_install_dir }}"
        owner: apache
        group: apache
        recurse: yes
      notify: 
       - Restart Apache
       - Restart PHP-FPM
