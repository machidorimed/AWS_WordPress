    # EPEL インストール
    - name: Install EPEL repository
      ansible.builtin.dnf:
        name: epel-release
        state: present

    # Remi GPGキーペア取得
    - name: Import Remi GPG key
      ansible.builtin.rpm_key:
        key: https://rpms.remirepo.net/enterprise/9/RPM-GPG-KEY-remi
        state: present

    # Remi インストール
    - name: Install Remi repository
      ansible.builtin.dnf:
        name: https://rpms.remirepo.net/enterprise/remi-release-9.rpm
        state: present

    # PHP-8.3 有効化
    - name: Specify Remi modularity for dnf
      ansible.builtin.dnf:
        name: '@php:remi-8.3'
        state: present

    # PHP パッケージインストール
    - name: Install PHP and extensions
      ansible.builtin.dnf:
        name: 
          - php 
          - php-pdo
          - php-mysqlnd
          - php-fpm
          - php-mbstring
        state: present
      notify: Restart Apache

    # PHP-FPM 自動起動
    - name: Start and enable PHP-FPM service
      systemd:
        name: php-fpm
        state: started
        enabled: yes

    # タイムゾーン設定
    - name: Set timezone in php.ini
      ansible.builtin.lineinfile:
        path: /etc/php.ini 
        regexp: '^;?date.timezone\s*='
        line: 'date.timezone = Asia/Tokyo'
        state: present
        backup: yes
      notify: Restart PHP-FPM

    # PHP バージョン非表示化
    - name: Disable expose_php in php.ini
      ansible.builtin.lineinfile:
        path: /etc/php.ini 
        regexp: '^;?expose_php\s*='
        line: 'expose_php = off'
        state: present
        backup: yes
      notify: Restart PHP-FPM

    # Apache テストページ内に PHP インフォメーションファイル追加
    - name: Deploy phpinfo file to Apache document root
      ansible.builtin.copy: 
        dest: /var/www/html/info.php
        content: "<?php\nphpinfo();\n"
        owner: apache
        group: apache
        mode: '0644'
